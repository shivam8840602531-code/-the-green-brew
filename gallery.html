<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Green Brew - Gallery</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#1b5e20;
color:white;
padding:20px;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
transition:.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.back{
display:block;
width:200px;
margin:30px auto;
padding:15px;
background:#2e7d32;
color:white;
text-align:center;
text-decoration:none;
border-radius:30px;
}
</style>

</head>

<body>

<header>
<h1>📸 The Green Brew Gallery</h1>
</header>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=800" alt="Cafe">

<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800" alt="Coffee">

<img src="https://images.unsplash.com/photo-1445116572660-236099ec97a0?w=800" alt="Cafe Interior">

<img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814?w=800" alt="Coffee Shop">

<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=800" alt="Coffee">

<img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800" alt="Restaurant">

</div>

<a href="index.html" class="back">⬅ Back to Home</a>

</body>
</html>
